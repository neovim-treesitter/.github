name: Bump Parser Version

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Check for parser update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read parser manifest
        id: manifest
        run: |
          echo "lang=$(jq -r '.lang // ""' parser.json)"                         >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.url // ""' parser.json)"                           >> "$GITHUB_OUTPUT"
          echo "semver=$(jq -r '.semver // false' parser.json)"                  >> "$GITHUB_OUTPUT"
          echo "parser_version=$(jq -r '.parser_version // ""' parser.json)"     >> "$GITHUB_OUTPUT"
          echo "location=$(jq -r '.location // ""' parser.json)"                 >> "$GITHUB_OUTPUT"
          echo "queries_only=$(jq -r '.queries_only // false' parser.json)"      >> "$GITHUB_OUTPUT"
          echo "host_parser_url=$(jq -r '.host_parser.url // ""' parser.json)"   >> "$GITHUB_OUTPUT"
          echo "host_parser_version=$(jq -r '.host_parser.parser_version // "HEAD"' parser.json)" >> "$GITHUB_OUTPUT"
          echo "host_parser_location=$(jq -r '.host_parser.location // ""' parser.json)" >> "$GITHUB_OUTPUT"

      - name: Skip if queries_only
        if: steps.manifest.outputs.queries_only == 'true'
        run: |
          echo "queries_only language — nothing to bump"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        id: skip_check

      - name: Check for tests
        if: steps.skip_check.outputs.skip != 'true'
        id: has_tests
        run: |
          HAS_TESTS=false
          if compgen -G "tests/highlights/*" > /dev/null 2>&1; then
            HAS_TESTS=true
          fi
          if compgen -G "test/corpus/*.txt" > /dev/null 2>&1; then
            HAS_TESTS=true
          fi
          echo "has_tests=${HAS_TESTS}" >> "$GITHUB_OUTPUT"
          if [[ "$HAS_TESTS" == "false" ]]; then
            echo "No tests found — skipping bump (tests required for automated PRs)"
          fi

      - name: Discover latest upstream version
        if: steps.skip_check.outputs.skip != 'true' && steps.has_tests.outputs.has_tests == 'true'
        id: discover
        env:
          URL: ${{ steps.manifest.outputs.url }}
          SEMVER: ${{ steps.manifest.outputs.semver }}
          CURRENT: ${{ steps.manifest.outputs.parser_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract owner/repo from URL
          REPO=$(echo "$URL" | sed 's|https://github.com/||' | sed 's|\.git$||' | sed 's|/$||')

          if [[ "$SEMVER" == "true" ]]; then
            # Get latest semver release tag
            LATEST=$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name' 2>/dev/null || true)
            if [[ -z "$LATEST" ]]; then
              # Fallback to tags sorted by semver
              LATEST=$(gh api "repos/${REPO}/tags" --jq '.[].name' 2>/dev/null \
                | grep -E '^v?[0-9]+\.[0-9]+' | head -1 || true)
            fi
          else
            # Get latest commit SHA on default branch
            LATEST=$(gh api "repos/${REPO}/commits?per_page=1" --jq '.[0].sha' 2>/dev/null || true)
          fi

          if [[ -z "$LATEST" ]]; then
            echo "Could not determine latest version for ${REPO}"
            exit 0
          fi

          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Current: ${CURRENT:-<none>}"
          echo "Latest:  ${LATEST}"

          if [[ "$LATEST" == "$CURRENT" ]]; then
            echo "Already up to date"
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version available"
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tree-sitter CLI
        if: steps.discover.outputs.needs_bump == 'true'
        uses: tree-sitter/setup-action/cli@v2

      - name: Build parser at new version
        if: steps.discover.outputs.needs_bump == 'true'
        env:
          URL:      ${{ steps.manifest.outputs.url }}
          REF:      ${{ steps.discover.outputs.latest }}
          LOCATION: ${{ steps.manifest.outputs.location }}
          LANG:     ${{ steps.manifest.outputs.lang }}
        run: |
          curl -sL "$URL/archive/$REF.tar.gz" -o parser.tar.gz
          SRC=$(tar -tf parser.tar.gz 2>/dev/null | head -1 | cut -d/ -f1 || true)
          tar -xzf parser.tar.gz
          [ -n "$LOCATION" ] && SRC="$SRC/$LOCATION"
          mkdir -p /tmp/ts-parsers
          tree-sitter build --output "/tmp/ts-parsers/${LANG}.so" "$SRC"

      - name: Build host parser (queries_only)
        if: steps.manifest.outputs.queries_only == 'true' && steps.manifest.outputs.host_parser_url != ''
        env:
          HOST_URL:  ${{ steps.manifest.outputs.host_parser_url }}
          HOST_REF:  ${{ steps.manifest.outputs.host_parser_version }}
          HOST_LOC:  ${{ steps.manifest.outputs.host_parser_location }}
          LANG:      ${{ steps.manifest.outputs.lang }}
        run: |
          REF="${HOST_REF:-HEAD}"
          curl -sL "$HOST_URL/archive/$REF.tar.gz" -o host-parser.tar.gz
          SRC=$(tar -tf host-parser.tar.gz 2>/dev/null | head -1 | cut -d/ -f1 || true)
          tar -xzf host-parser.tar.gz
          [ -n "$HOST_LOC" ] && SRC="$SRC/$HOST_LOC"
          mkdir -p /tmp/ts-parsers
          tree-sitter build --output "/tmp/ts-parsers/${LANG}.so" "$SRC"

      - name: Install injection dep parsers
        if: steps.discover.outputs.needs_bump == 'true' || steps.manifest.outputs.queries_only == 'true'
        shell: bash
        run: |
          DEPS=$(jq -r '.inject_deps // [] | .[]' parser.json)
          [ -z "$DEPS" ] && exit 0
          mkdir -p /tmp/ts-parsers
          for DEP in $DEPS; do
            [ -f "/tmp/ts-parsers/${DEP}.so" ] && continue
            echo "==> Building injection dep: $DEP"
            RAW="https://raw.githubusercontent.com/neovim-treesitter/nvim-treesitter-queries-${DEP}/main"
            PJSON=$(curl -sfL "${RAW}/parser.json" 2>/dev/null || echo '{}')
            PURL=$(echo "$PJSON" | jq -r '.url // ""')
            PREF=$(echo "$PJSON" | jq -r '.parser_version // "HEAD"')
            PLOC=$(echo "$PJSON" | jq -r '.location // ""')
            if [ -n "$PURL" ]; then
              curl -sL "${PURL}/archive/${PREF}.tar.gz" -o "dep-${DEP}.tar.gz"
              PSRC=$(tar -tf "dep-${DEP}.tar.gz" 2>/dev/null | head -1 | cut -d/ -f1 || true)
              tar -xzf "dep-${DEP}.tar.gz"
              [ -n "$PLOC" ] && PSRC="$PSRC/$PLOC"
              tree-sitter build --output "/tmp/ts-parsers/${DEP}.so" "$PSRC" \
                || echo "WARN: failed to build parser for $DEP"
            else
              echo "  skipping $DEP (no parser URL — may be queries-only)"
            fi
          done

      - name: Resolve inherited query dependencies
        if: steps.discover.outputs.needs_bump == 'true'
        shell: bash
        run: |
          mkdir -p /tmp/ts-parsers query-deps

          fetch_lang() {
            local LANG="$1"
            local ORG="neovim-treesitter"
            local REPO_NAME="nvim-treesitter-queries-${LANG}"
            local RAW_BASE="https://raw.githubusercontent.com/${ORG}/${REPO_NAME}/main"
            local API_BASE="https://api.github.com/repos/${ORG}/${REPO_NAME}"

            echo "==> Fetching dependency: $LANG"
            mkdir -p "query-deps/${LANG}"

            local FILES
            FILES=$(curl -sfL "${API_BASE}/contents/queries" \
              -H "Accept: application/vnd.github+json" \
              | jq -r '.[].name' 2>/dev/null || true)

            for FNAME in $FILES; do
              curl -sfL "${RAW_BASE}/queries/${FNAME}" \
                -o "query-deps/${LANG}/${FNAME}" || true
            done

            local PJSON PURL PREF PLOC
            PJSON=$(curl -sfL "${RAW_BASE}/parser.json" 2>/dev/null || echo '{}')
            PURL=$(echo "$PJSON" | jq -r '.url // ""')
            PREF=$(echo "$PJSON" | jq -r '.parser_version // "HEAD"')
            PLOC=$(echo "$PJSON" | jq -r '.location // ""')

            if [ -n "$PURL" ]; then
              curl -sL "${PURL}/archive/${PREF}.tar.gz" -o "dep-${LANG}.tar.gz"
              local PSRC
              PSRC=$(tar -tf "dep-${LANG}.tar.gz" 2>/dev/null | head -1 | cut -d/ -f1 || true)
              tar -xzf "dep-${LANG}.tar.gz"
              [ -n "$PLOC" ] && PSRC="$PSRC/$PLOC"
              tree-sitter build --output "/tmp/ts-parsers/${LANG}.so" "$PSRC" \
                || echo "WARN: failed to build parser for $LANG"
            fi
          }

          VISITED=""
          QUEUE=$(grep -rh '^; inherits:' queries/*.scm 2>/dev/null \
            | sed 's/; inherits: *//' | tr ',' '\n' | sed 's/?$//' \
            | tr -d ' ' | sort -u | tr '\n' ' ' || true)

          while [ -n "$QUEUE" ]; do
            NEXT_QUEUE=""
            for DEP in $QUEUE; do
              case " $VISITED " in *" $DEP "*) continue ;; esac
              VISITED="$VISITED $DEP"
              fetch_lang "$DEP"
              NEW=$(grep -rh '^; inherits:' "query-deps/${DEP}/" 2>/dev/null \
                | sed 's/; inherits: *//' | tr ',' '\n' | sed 's/?$//' \
                | tr -d ' ' | sort -u | tr '\n' ' ' || true)
              NEXT_QUEUE="$NEXT_QUEUE $NEW"
            done
            QUEUE="$NEXT_QUEUE"
          done

      - name: Write .tsqueryrc.json
        if: steps.discover.outputs.needs_bump == 'true'
        run: |
          cat > .tsqueryrc.json <<'EOF'
          {
            "parser_install_directories": ["/tmp/ts-parsers"],
            "supported_abi_versions": { "start": 13, "end": 15 },
            "language_retrieval_patterns": [
              "nvim-treesitter-queries-([^/]+)/queries/[^/]+\\.scm$",
              "query-deps/([^/]+)/[^/]+\\.scm$"
            ]
          }
          EOF

      - name: Install ts_query_ls
        if: steps.discover.outputs.needs_bump == 'true'
        run: |
          curl -fL https://github.com/ribru17/ts_query_ls/releases/latest/download/ts_query_ls-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz

      - name: Check queries against new parser
        if: steps.discover.outputs.needs_bump == 'true'
        run: ./ts_query_ls check queries/

      - name: Run corpus tests
        if: steps.discover.outputs.needs_bump == 'true' && hashFiles('test/corpus/*.txt') != ''
        env:
          TREE_SITTER_DIR: ${{ github.workspace }}
        run: tree-sitter test

      - name: Run highlight tests
        if: steps.discover.outputs.needs_bump == 'true' && hashFiles('tests/highlights/*') != ''
        env:
          LANG: ${{ steps.manifest.outputs.lang }}
        run: |
          curl -fL https://github.com/nvim-treesitter/highlight-assertions/releases/latest/download/highlight-assertions-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /tmp
          ERRORS=0
          for FILE in tests/highlights/*; do
            [ -f "$FILE" ] || continue
            if ! /tmp/highlight-assertions \
                --parser-file "/tmp/ts-parsers/${LANG}.so" \
                --source-file "$FILE"; then
              ERRORS=$((ERRORS + 1))
            fi
          done
          [ "$ERRORS" -eq 0 ] || exit 1

      - name: Create bump PR
        if: steps.discover.outputs.needs_bump == 'true'
        env:
          LATEST: ${{ steps.discover.outputs.latest }}
          CURRENT: ${{ steps.manifest.outputs.parser_version }}
          LANG: ${{ steps.manifest.outputs.lang }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="bump-parser-version/${LATEST}"

          # Check if a PR already exists for this version
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq 'length')
          if [[ "$EXISTING" -gt 0 ]]; then
            echo "PR already exists for ${BRANCH} — skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Update parser_version in parser.json
          jq --arg v "$LATEST" '.parser_version = $v' parser.json > parser.json.tmp
          mv parser.json.tmp parser.json

          git add parser.json
          git commit -m "fix: bump parser_version to ${LATEST}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "Bump parser_version to ${LATEST}" \
            --body "$(cat <<EOF
          Automated parser version bump for **${LANG}**.

          - Previous: \`${CURRENT:-<none>}\`
          - New: \`${LATEST}\`

          All validation checks (query lint, highlight tests, corpus tests) passed
          against the new parser version before this PR was created.
          EOF
          )"
