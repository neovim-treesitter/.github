name: Bump Parser Version

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover latest upstream version
    runs-on: ubuntu-latest
    outputs:
      needs_bump:    ${{ steps.discover.outputs.needs_bump }}
      latest:        ${{ steps.discover.outputs.latest }}
      current:       ${{ steps.manifest.outputs.parser_version }}
      lang:          ${{ steps.manifest.outputs.lang }}
    steps:
      - uses: actions/checkout@v6

      - name: Read parser manifest
        id: manifest
        run: |
          echo "lang=$(jq -r '.lang // ""' parser.json)"                     >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.url // "" | sub("\\.git$"; "")' parser.json)"  >> "$GITHUB_OUTPUT"
          echo "semver=$(jq -r '.semver // false' parser.json)"              >> "$GITHUB_OUTPUT"
          echo "parser_version=$(jq -r '.parser_version // ""' parser.json)" >> "$GITHUB_OUTPUT"
          echo "queries_only=$(jq -r '.queries_only // false' parser.json)"  >> "$GITHUB_OUTPUT"

      - name: Skip if queries_only
        if: steps.manifest.outputs.queries_only == 'true'
        run: |
          echo "queries_only language — nothing to bump"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        id: skip_check

      - name: Check for tests
        if: steps.skip_check.outputs.skip != 'true'
        id: has_tests
        run: |
          HAS_TESTS=false
          if compgen -G "tests/highlights/*" > /dev/null 2>&1; then
            HAS_TESTS=true
          fi
          if compgen -G "test/corpus/*.txt" > /dev/null 2>&1; then
            HAS_TESTS=true
          fi
          echo "has_tests=${HAS_TESTS}" >> "$GITHUB_OUTPUT"
          if [[ "$HAS_TESTS" == "false" ]]; then
            echo "No tests found — skipping bump (tests required for automated PRs)"
          fi

      - name: Discover latest upstream version
        if: steps.skip_check.outputs.skip != 'true' && steps.has_tests.outputs.has_tests == 'true'
        id: discover
        env:
          URL:     ${{ steps.manifest.outputs.url }}
          SEMVER:  ${{ steps.manifest.outputs.semver }}
          CURRENT: ${{ steps.manifest.outputs.parser_version }}
        run: |
          if [[ "$SEMVER" == "true" ]]; then
            # Latest semver tag via git ls-remote — no API, no auth needed
            LATEST=$(git -c versionsort.suffix=- \
              ls-remote --tags --refs --sort=v:refname "$URL" \
              | awk '{print $2}' | sed 's|refs/tags/||' \
              | grep -E '^v[0-9]+\.[0-9]+' | tail -1 || true)
          else
            # HEAD commit SHA via git ls-remote
            LATEST=$(git ls-remote "$URL" HEAD | awk '{print $1}' || true)
          fi

          if [[ -z "$LATEST" ]]; then
            echo "Could not determine latest version for ${URL}"
            exit 0
          fi

          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Current: ${CURRENT:-<none>}"
          echo "Latest:  ${LATEST}"

          if [[ "$LATEST" == "$CURRENT" ]]; then
            echo "Already up to date"
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version available"
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          fi

  validate-and-bump:
    name: Validate and create bump PR
    needs: [discover]
    if: needs.discover.outputs.needs_bump == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup query environment
        id: setup
        uses: neovim-treesitter/.github/.github/actions/setup-query-env@main
        with:
          parser-version-override: ${{ needs.discover.outputs.latest }}

      - name: Run corpus tests
        if: hashFiles('test/corpus/*.txt') != ''
        env:
          TREE_SITTER_DIR: ${{ github.workspace }}
        run: tree-sitter test

      - name: Run highlight tests
        if: hashFiles('tests/highlights/*') != ''
        env:
          LANG:             ${{ steps.setup.outputs.lang }}
          HOST_PARSER_LANG: ${{ steps.setup.outputs.host_parser_lang }}
        run: |
          curl -fL https://github.com/nvim-treesitter/highlight-assertions/releases/latest/download/highlight-assertions-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /tmp
          PARSER_LANG="${HOST_PARSER_LANG:-$LANG}"
          ERRORS=0
          for FILE in tests/highlights/*; do
            [ -f "$FILE" ] || continue
            if ! /tmp/highlight-assertions \
                --parser-file "/tmp/ts-parsers/${PARSER_LANG}.so" \
                --source-file "$FILE"; then
              ERRORS=$((ERRORS + 1))
            fi
          done
          [ "$ERRORS" -eq 0 ] || exit 1

      - name: Create bump PR
        env:
          LATEST:  ${{ needs.discover.outputs.latest }}
          CURRENT: ${{ needs.discover.outputs.current }}
          LANG:    ${{ needs.discover.outputs.lang }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="bump-parser-version/${LATEST}"

          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq 'length')
          if [[ "$EXISTING" -gt 0 ]]; then
            echo "PR already exists for ${BRANCH} — skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          jq --arg v "$LATEST" '.parser_version = $v' parser.json > parser.json.tmp
          mv parser.json.tmp parser.json

          git add parser.json
          git commit -m "fix: bump parser_version to ${LATEST}"
          git push -u origin "$BRANCH"

          printf 'Automated parser version bump for **%s**.\n\n- Previous: `%s`\n- New: `%s`\n\nAll validation checks (query lint, highlight tests, corpus tests) passed\nagainst the new parser version before this PR was created.\n' \
            "$LANG" "${CURRENT:-<none>}" "$LATEST" > /tmp/pr-body.md

          gh pr create \
            --title "Bump parser_version to ${LATEST}" \
            --body-file /tmp/pr-body.md
