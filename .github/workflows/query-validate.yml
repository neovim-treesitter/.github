name: Validate Queries

on:
  workflow_call:
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate parser.json against schema
        run: |
          npm install --global ajv-cli ajv-formats
          # Fetch the parserManifest schema from the registry repo
          curl -sfL https://raw.githubusercontent.com/neovim-treesitter/treesitter-parser-registry/main/schemas/schema.json \
            -o /tmp/registry-schema.json
          # Extract just the parserManifest definition into a standalone schema
          jq '{
            "$schema": "https://json-schema.org/draft/2020-12/schema",
            "$defs": ."$defs",
            "$ref": "#/$defs/parserManifest"
          }' /tmp/registry-schema.json > /tmp/parser-manifest-schema.json
          ajv validate \
            --spec=draft2020 \
            --strict=false \
            -c ajv-formats \
            -s /tmp/parser-manifest-schema.json \
            -d parser.json

      - name: Setup query environment
        id: setup
        uses: ./.github/actions/setup-query-env

      - name: Install highlight-assertions
        if: ${{ hashFiles('tests/highlights/**/*') != '' }}
        run: |
          curl -fL https://github.com/nvim-treesitter/highlight-assertions/releases/latest/download/highlight-assertions-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /tmp

      - name: Run highlight tests
        if: ${{ hashFiles('tests/highlights/**/*') != '' }}
        env:
          LANG:             ${{ steps.setup.outputs.lang }}
          HOST_PARSER_LANG: ${{ steps.setup.outputs.host_parser_lang }}
        run: |
          # For queries_only langs, the .so is named after the host language
          PARSER_LANG="${HOST_PARSER_LANG:-$LANG}"
          ERRORS=0
          for FILE in tests/highlights/*; do
            [ -f "$FILE" ] || continue
            echo "==> $FILE"
            if ! /tmp/highlight-assertions \
                --parser-file "/tmp/ts-parsers/${PARSER_LANG}.so" \
                --source-file "$FILE"; then
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS highlight test file(s) failed"
            exit 1
          fi

      - name: Run corpus tests
        if: ${{ hashFiles('test/corpus/*.txt') != '' }}
        env:
          TREE_SITTER_DIR: ${{ github.workspace }}
        run: tree-sitter test
