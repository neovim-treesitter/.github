name: Update Language List

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Regenerate language list
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch registry.json
        run: |
          curl -sfL https://raw.githubusercontent.com/neovim-treesitter/treesitter-parser-registry/main/registry.json \
            -o /tmp/registry.json

      - name: Generate language list
        run: bash scripts/generate-language-list.sh /tmp/registry.json profile/README.md

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet profile/README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "docs: update language list from registry"
          git push
