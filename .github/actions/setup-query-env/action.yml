name: Setup Query Environment
description: >
  Shared setup for tree-sitter query repos: read parser manifest, build parsers,
  resolve inherited dependencies, install ts_query_ls and run query checks.

inputs:
  parser-version-override:
    description: >
      When set, overrides the parser_version from parser.json.
      Used by the bump workflow to test a new upstream version.
    required: false
    default: ''
  skip-check:
    description: >
      When 'true', skips the ts_query_ls check step.
    required: false
    default: 'false'

outputs:
  lang:
    description: Language name from parser.json
    value: ${{ steps.manifest.outputs.lang }}
  url:
    description: Parser repo URL (without .git suffix)
    value: ${{ steps.manifest.outputs.url }}
  parser_version:
    description: Effective parser version (may be overridden)
    value: ${{ steps.manifest.outputs.parser_version }}
  location:
    description: Subdirectory within the parser repo
    value: ${{ steps.manifest.outputs.location }}
  queries_only:
    description: Whether this is a queries-only language
    value: ${{ steps.manifest.outputs.queries_only }}
  generate:
    description: Whether tree-sitter generate is needed
    value: ${{ steps.manifest.outputs.generate }}
  generate_from_json:
    description: Whether to generate from src/grammar.json
    value: ${{ steps.manifest.outputs.generate_from_json }}
  host_parser_url:
    description: Host parser URL for queries_only languages
    value: ${{ steps.manifest.outputs.host_parser_url }}
  host_parser_version:
    description: Host parser version
    value: ${{ steps.manifest.outputs.host_parser_version }}
  host_parser_location:
    description: Host parser subdirectory
    value: ${{ steps.manifest.outputs.host_parser_location }}
  host_parser_lang:
    description: Host parser language name
    value: ${{ steps.manifest.outputs.host_parser_lang }}

runs:
  using: composite
  steps:
    - name: Read parser manifest
      id: manifest
      shell: bash
      env:
        VERSION_OVERRIDE: ${{ inputs.parser-version-override }}
      run: |
        echo "lang=$(jq -r '.lang // ""' parser.json)"                       >> "$GITHUB_OUTPUT"
        echo "url=$(jq -r '.url // "" | sub("\\.git$"; "")' parser.json)"    >> "$GITHUB_OUTPUT"
        echo "location=$(jq -r '.location // ""' parser.json)"               >> "$GITHUB_OUTPUT"
        echo "queries_only=$(jq -r '.queries_only // false' parser.json)"    >> "$GITHUB_OUTPUT"
        echo "generate=$(jq -r '.generate // false' parser.json)"            >> "$GITHUB_OUTPUT"
        echo "generate_from_json=$(jq -r '.generate_from_json // false' parser.json)" >> "$GITHUB_OUTPUT"
        echo "host_parser_url=$(jq -r '.host_parser.url // "" | sub("\\.git$"; "")' parser.json)" >> "$GITHUB_OUTPUT"
        echo "host_parser_version=$(jq -r '.host_parser.parser_version // "HEAD"' parser.json)" >> "$GITHUB_OUTPUT"
        echo "host_parser_location=$(jq -r '.host_parser.location // ""' parser.json)" >> "$GITHUB_OUTPUT"
        echo "host_parser_lang=$(jq -r '.host_parser.lang // ""' parser.json)" >> "$GITHUB_OUTPUT"
        # parser_version: use override if provided, else read from manifest
        if [ -n "$VERSION_OVERRIDE" ]; then
          echo "parser_version=${VERSION_OVERRIDE}" >> "$GITHUB_OUTPUT"
          echo "Using parser_version override: ${VERSION_OVERRIDE}"
        else
          echo "parser_version=$(jq -r '.parser_version // "HEAD"' parser.json)" >> "$GITHUB_OUTPUT"
        fi

    - name: Install tree-sitter CLI
      uses: tree-sitter/setup-action/cli@v2

    - name: Build parser
      if: steps.manifest.outputs.queries_only != 'true' && steps.manifest.outputs.url != ''
      shell: bash
      env:
        URL:               ${{ steps.manifest.outputs.url }}
        REF:               ${{ steps.manifest.outputs.parser_version }}
        LOCATION:          ${{ steps.manifest.outputs.location }}
        LANG:              ${{ steps.manifest.outputs.lang }}
        NEEDS_GENERATE:    ${{ steps.manifest.outputs.generate }}
        GENERATE_FROM_JSON: ${{ steps.manifest.outputs.generate_from_json }}
      run: |
        curl -sL "$URL/archive/$REF.tar.gz" -o parser.tar.gz
        # Detect the actual extracted dir name from the archive
        SRC=$(tar -tf parser.tar.gz 2>/dev/null | head -1 | cut -d/ -f1 || true)
        tar -xzf parser.tar.gz
        [ -n "$LOCATION" ] && SRC="$SRC/$LOCATION"
        # Some parsers need tree-sitter generate before building
        if [ "$NEEDS_GENERATE" = "true" ]; then
          pushd "$SRC"
          if [ "$GENERATE_FROM_JSON" = "true" ]; then
            tree-sitter generate src/grammar.json
          else
            npm install 2>/dev/null || true
            tree-sitter generate
          fi
          popd
        fi
        mkdir -p /tmp/ts-parsers
        tree-sitter build --output "/tmp/ts-parsers/${LANG}.so" "$SRC"

    - name: Build host parser (queries_only)
      if: steps.manifest.outputs.queries_only == 'true' && steps.manifest.outputs.host_parser_url != ''
      shell: bash
      env:
        HOST_URL:         ${{ steps.manifest.outputs.host_parser_url }}
        HOST_REF:         ${{ steps.manifest.outputs.host_parser_version }}
        HOST_LOC:         ${{ steps.manifest.outputs.host_parser_location }}
        HOST_PARSER_LANG: ${{ steps.manifest.outputs.host_parser_lang }}
        LANG:             ${{ steps.manifest.outputs.lang }}
      run: |
        REF="${HOST_REF:-HEAD}"
        curl -sL "$HOST_URL/archive/$REF.tar.gz" -o host-parser.tar.gz
        SRC=$(tar -tf host-parser.tar.gz 2>/dev/null | head -1 | cut -d/ -f1 || true)
        tar -xzf host-parser.tar.gz
        [ -n "$HOST_LOC" ] && SRC="$SRC/$HOST_LOC"
        mkdir -p /tmp/ts-parsers
        HOST_LANG="${HOST_PARSER_LANG:-$LANG}"
        tree-sitter build --output "/tmp/ts-parsers/${HOST_LANG}.so" "$SRC"

    - name: Install injection dep parsers
      shell: bash
      run: |
        DEPS=$(jq -r '.inject_deps // [] | .[]' parser.json)
        [ -z "$DEPS" ] && exit 0
        mkdir -p /tmp/ts-parsers
        for DEP in $DEPS; do
          [ -f "/tmp/ts-parsers/${DEP}.so" ] && continue
          echo "==> Building injection dep: $DEP"
          RAW="https://raw.githubusercontent.com/neovim-treesitter/nvim-treesitter-queries-${DEP}/main"
          PJSON=$(curl -sfL "${RAW}/parser.json" 2>/dev/null || echo '{}')
          PURL=$(echo "$PJSON" | jq -r '.url // ""')
          PREF=$(echo "$PJSON" | jq -r '.parser_version // "HEAD"')
          PLOC=$(echo "$PJSON" | jq -r '.location // ""')
          if [ -n "$PURL" ]; then
            curl -sL "${PURL}/archive/${PREF}.tar.gz" -o "dep-${DEP}.tar.gz"
            PSRC=$(tar -tf "dep-${DEP}.tar.gz" 2>/dev/null | head -1 | cut -d/ -f1 || true)
            tar -xzf "dep-${DEP}.tar.gz"
            [ -n "$PLOC" ] && PSRC="$PSRC/$PLOC"
            tree-sitter build --output "/tmp/ts-parsers/${DEP}.so" "$PSRC" \
              || echo "WARN: failed to build parser for $DEP"
          else
            echo "  skipping $DEP (no parser URL — may be queries-only)"
          fi
        done

    - name: Resolve inherited query dependencies
      shell: bash
      run: |
        mkdir -p /tmp/ts-parsers query-deps

        fetch_lang() {
          local LANG="$1"
          local ORG="neovim-treesitter"
          local REPO_NAME="nvim-treesitter-queries-${LANG}"
          local RAW_BASE="https://raw.githubusercontent.com/${ORG}/${REPO_NAME}/main"
          local API_BASE="https://api.github.com/repos/${ORG}/${REPO_NAME}"

          echo "==> Fetching dependency: $LANG"
          mkdir -p "query-deps/${LANG}"

          local FILES
          FILES=$(curl -sfL "${API_BASE}/contents/queries" \
            -H "Accept: application/vnd.github+json" \
            | jq -r '.[].name' 2>/dev/null || true)

          for FNAME in $FILES; do
            curl -sfL "${RAW_BASE}/queries/${FNAME}" \
              -o "query-deps/${LANG}/${FNAME}" || true
          done
          echo "  downloaded $(ls query-deps/${LANG}/ 2>/dev/null | wc -l) query files for ${LANG}"

          local PJSON PURL PREF PLOC
          PJSON=$(curl -sfL "${RAW_BASE}/parser.json" 2>/dev/null || echo '{}')
          PURL=$(echo "$PJSON" | jq -r '.url // ""')
          PREF=$(echo "$PJSON" | jq -r '.parser_version // "HEAD"')
          PLOC=$(echo "$PJSON" | jq -r '.location // ""')

          if [ -n "$PURL" ]; then
            curl -sL "${PURL}/archive/${PREF}.tar.gz" -o "dep-${LANG}.tar.gz"
            local PSRC
            PSRC=$(tar -tf "dep-${LANG}.tar.gz" 2>/dev/null | head -1 | cut -d/ -f1 || true)
            tar -xzf "dep-${LANG}.tar.gz"
            [ -n "$PLOC" ] && PSRC="$PSRC/$PLOC"
            tree-sitter build --output "/tmp/ts-parsers/${LANG}.so" "$PSRC" \
              || echo "WARN: failed to build parser for $LANG"
          fi
        }

        # BFS over ; inherits: graph
        VISITED=""
        QUEUE=$(grep -rh '^; inherits:' queries/*.scm 2>/dev/null \
          | sed 's/; inherits: *//' | tr ',' '\n' | sed 's/?$//' \
          | tr -d ' ' | sort -u | tr '\n' ' ' || true)

        while [ -n "$QUEUE" ]; do
          NEXT_QUEUE=""
          for DEP in $QUEUE; do
            case " $VISITED " in *" $DEP "*) continue ;; esac
            VISITED="$VISITED $DEP"
            fetch_lang "$DEP"
            NEW=$(grep -rh '^; inherits:' "query-deps/${DEP}/" 2>/dev/null \
              | sed 's/; inherits: *//' | tr ',' '\n' | sed 's/?$//' \
              | tr -d ' ' | sort -u | tr '\n' ' ' || true)
            NEXT_QUEUE="$NEXT_QUEUE $NEW"
          done
          QUEUE="$NEXT_QUEUE"
        done

    - name: Write .tsqueryrc.json
      shell: bash
      env:
        LANG:             ${{ steps.manifest.outputs.lang }}
        HOST_PARSER_LANG: ${{ steps.manifest.outputs.host_parser_lang }}
      run: |
        ALIASES="{}"
        if [ -n "$HOST_PARSER_LANG" ] && [ "$HOST_PARSER_LANG" != "$LANG" ]; then
          ALIASES=$(jq -n --arg lang "$LANG" --arg host "$HOST_PARSER_LANG" \
            '{($lang): $host}')
        fi
        jq -n \
          --argjson aliases "$ALIASES" \
          '{
            parser_install_directories: ["/tmp/ts-parsers"],
            supported_abi_versions: { start: 13, end: 15 },
            language_retrieval_patterns: [
              "nvim-treesitter-queries-([^/]+)/queries/[^/]+\\.scm$",
              "query-deps/([^/]+)/[^/]+\\.scm$"
            ]
          } + if $aliases != {} then { parser_aliases: $aliases } else {} end' \
          > .tsqueryrc.json
        echo "==> .tsqueryrc.json:"
        cat .tsqueryrc.json

    - name: Install ts_query_ls
      if: inputs.skip-check != 'true'
      shell: bash
      run: |
        curl -fL https://github.com/ribru17/ts_query_ls/releases/latest/download/ts_query_ls-x86_64-unknown-linux-gnu.tar.gz \
          | tar -xz

    - name: Check queries
      if: inputs.skip-check != 'true'
      shell: bash
      run: ./ts_query_ls check queries/
